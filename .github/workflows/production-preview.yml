name: Production Expo Preview

on:
  push:
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: production-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    permissions:
      contents: write
      pull-requests: write
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_LOG_LEVEL: info
      EXPO_PUBLIC_DEV_LOGIN_EMAIL: ${{ secrets.EXPO_PUBLIC_DEV_LOGIN_EMAIL }}
      EXPO_PUBLIC_DEV_LOGIN_PASSWORD: ${{ secrets.EXPO_PUBLIC_DEV_LOGIN_PASSWORD }}
      EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Cache Expo/Metro
        uses: actions/cache@v4
        with:
          path: |
            ~/.expo
            ~/.cache/expo
            ~/.cache/metro
          key: expo-${{ runner.os }}-${{ hashFiles('Frontend/package-lock.json') }}
          restore-keys: |
            expo-${{ runner.os }}-

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Create Expo update
        id: expo-update
        run: |
          # Determine branch name based on event type
          if [ "${{ github.event_name }}" == "release" ]; then
            BRANCH_NAME="release-${{ github.event.release.tag_name }}"
          else
            BRANCH_NAME="main"
          fi
          
          # Run EAS update and capture output
          OUTPUT=$(eas update --auto --branch=$BRANCH_NAME --platform=ios --json 2>&1) || true
          echo "Raw output: $OUTPUT"
          
          # Extract the update group ID from the JSON output
          UPDATE_GROUP=$(echo "$OUTPUT" | grep -o '"group":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "update_group=$UPDATE_GROUP" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          # Get project info for QR code URL
          PROJECT_ID=$(npx expo config --json 2>/dev/null | grep -o '"projectId":"[^"]*"' | cut -d'"' -f4)
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Add commit comment with QR code (on push to main)
        if: github.event_name == 'push'
        uses: actions/github-script@v8
        with:
          script: |
            const updateGroup = '${{ steps.expo-update.outputs.update_group }}';
            const branchName = '${{ steps.expo-update.outputs.branch_name }}';
            const projectId = '${{ steps.expo-update.outputs.project_id }}';
            
            let qrUrl = '';
            let updateUrl = '';
            
            if (updateGroup && projectId) {
              qrUrl = `https://qr.expo.dev/eas-update?updateId=${updateGroup}&appScheme=exp&host=u.expo.dev`;
              updateUrl = `https://expo.dev/projects/${projectId}/updates/${updateGroup}`;
            }
            
            const body = `## Expo Preview
            
            A new Expo update has been published for this commit.
            
            **Branch:** \`${branchName}\`
            **Commit:** \`${context.sha.substring(0, 7)}\`
            
            ${qrUrl ? `### Scan to Preview
            
            ![QR Code](${qrUrl})
            
            [View Update on Expo](${updateUrl})` : '⚠️ Could not generate QR code. Check the workflow logs for details.'}
            
            ---
            *Published via [Expo GitHub Action](https://github.com/expo/expo-github-action)*`;
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });
            
            console.log(`Added Expo preview comment to commit ${context.sha}`);

      - name: Append QR code to release notes (on release)
        if: github.event_name == 'release'
        uses: actions/github-script@v8
        with:
          script: |
            const updateGroup = '${{ steps.expo-update.outputs.update_group }}';
            const branchName = '${{ steps.expo-update.outputs.branch_name }}';
            const projectId = '${{ steps.expo-update.outputs.project_id }}';
            
            let qrUrl = '';
            let updateUrl = '';
            
            if (updateGroup && projectId) {
              qrUrl = `https://qr.expo.dev/eas-update?updateId=${updateGroup}&appScheme=exp&host=u.expo.dev`;
              updateUrl = `https://expo.dev/projects/${projectId}/updates/${updateGroup}`;
            }
            
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id
            });
            
            const existingBody = release.data.body || '';
            
            const expoSection = `
            
            ---
            
            ## Expo Preview
            
            ${qrUrl ? `### Scan to Preview
            
            ![QR Code](${qrUrl})
            
            [View Update on Expo](${updateUrl})` : '⚠️ Could not generate QR code. Check the workflow logs for details.'}
            
            **Branch:** \`${branchName}\`
            
            *Published via [Expo GitHub Action](https://github.com/expo/expo-github-action)*`;
            
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: existingBody + expoSection
            });
            
            console.log(`Appended Expo preview to release ${context.payload.release.tag_name}`);
